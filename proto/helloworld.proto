syntax = "proto3";
package helloworld;

service Greeter {
    rpc SayHello (HelloRequest) returns (HelloReply);
    rpc AddTensors (AddTensorsRequest) returns (AddTensorsResponse);
}

message HelloRequest {
   string name = 1;
}

message HelloReply {
    string message = 1;
}

message Tensor {
    repeated float values = 1;
    repeated int64 shape = 2;
}

message AddTensorsRequest {
    Tensor a = 1;
    Tensor b = 2;
}

message AddTensorsResponse {
    Tensor result = 1;
}
