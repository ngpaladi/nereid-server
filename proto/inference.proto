syntax = "proto3";
package inference;

service Health {
    rpc HealthCheck (HealthCheckRequest) returns (HealthCheckResponse);
}

service Sonic {
    rpc ViewModels (ViewModelsRequest) returns (ViewModelsResponse);
    rpc Checkpoint (CheckpointRequest) returns (stream CheckpointResponse);
}

message HealthCheckRequest {}

message HealthCheckResponse {
    string status = 1;
}

message ViewModelsRequest {}

message ViewModelsResponse {
    repeated string model_names = 1;
}

message CheckpointRequest {
    string model_name = 1;
    string data = 2;
    string output_file = 3;
}

message CheckpointResponse {
    string chunk = 1;
    bool done = 2;
    int32 exit_code = 3;
}

message ModelInferenceConfig {
    string model_path = 1;
    repeated int64 input_shape = 2;
}
