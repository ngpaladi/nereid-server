syntax = "proto3";
package inference;

service Health {
    rpc HealthCheck (HealthCheckRequest) returns (HealthCheckResponse);
}

service Sonic {
    rpc ViewModels (ViewModelsRequest) returns (ViewModelsResponse);
    rpc Checkpoint (stream CheckpointRequest) returns (stream CheckpointResponse);
}

message HealthCheckRequest {}

message HealthCheckResponse {
    string status = 1;
}

message ViewModelsRequest {}

message ViewModelsResponse {
    repeated string model_names = 1;
}

message CheckpointRequest {
    oneof payload {
        CheckpointMeta meta = 1;
        TensorChunk chunk = 2;
    }
}

message CheckpointMeta {
    string model_name = 1;
    string output_file = 2;
}

message TensorChunk {
    string tensor_name = 1;
    repeated int64 shape = 2;
    bytes data = 3;
    uint64 chunk_index = 4;
    bool end_of_tensor = 5;
}

message CheckpointResponse {
    string chunk = 1;
    bool done = 2;
    int32 exit_code = 3;
}

message ModelInferenceConfig {
    string model_path = 1;
    repeated int64 input_shape = 2;
}
