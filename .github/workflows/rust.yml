name: Rust

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  # Style/lint gate: fails the build on unformatted code or clippy warnings, so
  # cosmetic reformatting can't creep into functional diffs.
  lint:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install rustfmt and clippy
      run: rustup component add rustfmt clippy

    - name: Check formatting
      run: cargo fmt --all --check

    - name: Clippy (deny warnings)
      run: cargo clippy --all-targets -- -D warnings

  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    # The Python backend tests have the server build a per-model virtualenv via
    # `python3 -m venv`, which requires the venv module to be present.
    - name: Install Python venv support
      run: |
        sudo apt-get update
        sudo apt-get install -y python3-venv

    - name: Build
      run: cargo build --verbose

    # The full-stack inference tests (checkpoint_e2e_tests) load TorchScript .pt
    # models through `tch`, so libtorch's shared libraries must be on the loader
    # path at runtime. Point LD_LIBRARY_PATH at the libtorch lib/ directory that
    # `tch` extracted into target/ (the largest, fully-extracted libtorch_cpu.so).
    - name: Run tests
      run: |
        export LD_LIBRARY_PATH="$(dirname "$(find target -name libtorch_cpu.so -printf '%s %p\n' 2>/dev/null | sort -rn | head -1 | cut -d' ' -f2-)")":$LD_LIBRARY_PATH
        cargo test --verbose

  # Exercises the opt-in native backends (ONNX via `ort`, TensorFlow via
  # libtensorflow). These features are off in the default build, so the jobs
  # above never touch them. `ort` downloads ONNX Runtime and the `tensorflow`
  # crate downloads libtensorflow during the build — no system packages needed.
  native-backends:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install clippy
      run: rustup component add clippy

    # Compile both native backends and lint them under the same deny-warnings
    # gate as the default build. This links ONNX Runtime and libtensorflow.
    - name: Clippy (onnx + tensorflow, deny warnings)
      run: cargo clippy --all-targets --features onnx,tensorflow -- -D warnings

    # Run the ONNX backend end to end (loads the committed onnxadd fixture and
    # asserts output == input + 1). Built with only `--features onnx` so the
    # test binary doesn't need libtensorflow on the loader path; libtorch (which
    # `tch` still links) is pointed at the copy `torch-sys` extracted into target/.
    - name: Run ONNX end-to-end test
      run: |
        export LD_LIBRARY_PATH="$(dirname "$(find target -name libtorch_cpu.so -printf '%s %p\n' 2>/dev/null | sort -rn | head -1 | cut -d' ' -f2-)")":$LD_LIBRARY_PATH
        cargo test --features onnx --verbose onnx_model_infer

    # Run the TensorFlow backend end to end (loads the committed tfadd SavedModel
    # and asserts output == input + 1). Needs both libtorch (tch) and
    # libtensorflow on the loader path — both were extracted into target/ by their
    # build scripts.
    - name: Run TensorFlow end-to-end test
      run: |
        torch="$(dirname "$(find target -name libtorch_cpu.so -printf '%s %p\n' 2>/dev/null | sort -rn | head -1 | cut -d' ' -f2-)")"
        tf="$(dirname "$(find target -name 'libtensorflow.so*' 2>/dev/null | head -1)")"
        export LD_LIBRARY_PATH="$torch:$tf:$LD_LIBRARY_PATH"
        cargo test --features tensorflow --verbose tensorflow_model_infer

  # Proves the build is modular: an ONNX-only (and native-only) server compiles
  # with the torch+python defaults turned off and links no libtorch at all.
  modular-build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Build ONNX-only (no torch, no python)
      run: cargo build --no-default-features --features onnx

    - name: Verify the ONNX-only binary links no libtorch
      run: |
        bin=target/debug/grpc-test
        if ldd "$bin" | grep -iE 'libtorch|libc10'; then
          echo "ERROR: an ONNX-only build must not link libtorch"; exit 1
        fi
        echo "OK: no libtorch/libc10 dependency"

    - name: Build native-only (onnx + tensorflow, still no libtorch)
      run: cargo build --no-default-features --features onnx,tensorflow

    - name: Build each backend alone
      run: |
        cargo build --no-default-features --features torch
        cargo build --no-default-features --features python
        cargo build --no-default-features --features tensorflow
